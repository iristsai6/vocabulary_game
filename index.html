<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英文練習</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d0d;--card:#161616;--border:#2a2a2a;--accent:#e8ff47;--accent2:#ff6b35;--text:#f0f0f0;--muted:#666;--correct:#4ade80;--wrong:#f87171;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 48px;}
  body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(232,255,71,0.04) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(255,107,53,0.04) 0%,transparent 50%);pointer-events:none;}
  .container{width:100%;max-width:500px;}

  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;}
  .title span{color:var(--accent);}
  .score-area{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .score-bar{display:flex;gap:6px;align-items:center;font-size:13px;color:var(--muted);}
  .score-val{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--accent);}
  .streak{font-size:13px;color:var(--muted);}
  .streak-val{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--accent2);}

  /* TOPIC SELECTOR */
  .topic-screen{text-align:center;padding:20px 0;}
  .topic-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px;}
  .topic-title span{color:var(--accent);}
  .topic-sub{font-size:14px;color:var(--muted);margin-bottom:32px;}
  .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .topic-btn{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:24px 16px;cursor:pointer;transition:all 0.2s;text-align:center;position:relative;overflow:hidden;}
  .topic-btn::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:opacity 0.2s;}
  .topic-btn:hover{border-color:var(--accent);transform:translateY(-2px);}
  .topic-btn:hover::before{opacity:0.04;}
  .topic-icon{font-size:32px;margin-bottom:10px;display:block;}
  .topic-name{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;}
  .topic-desc{font-size:12px;color:var(--muted);}

  /* TABS (in-game) */
  .tab-bar{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:2px;}
  .tab-bar::-webkit-scrollbar{display:none;}
  .tab{background:var(--card);border:1.5px solid var(--border);color:var(--muted);border-radius:99px;padding:6px 14px;font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}

  /* PROGRESS */
  .progress-wrap{background:var(--border);border-radius:99px;height:4px;margin-bottom:24px;overflow:hidden;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width 0.5s ease;}

  /* CARD */
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:14px;position:relative;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);border-radius:20px 20px 0 0;}

  .diff-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:99px;margin-bottom:14px;}
  .badge-easy{background:rgba(74,222,128,0.15);color:var(--correct);}
  .badge-medium{background:rgba(232,255,71,0.15);color:var(--accent);}
  .badge-hard{background:rgba(248,113,113,0.15);color:var(--wrong);}

  /* VOCAB word display */
  .word-display{font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,9vw,48px);font-weight:700;letter-spacing:-1px;margin:0 0 16px 0;padding:0.1em 0 0.4em 0;line-height:1.2;word-break:break-word;display:block;}
  .word-hint{font-size:13px;color:var(--muted);margin-bottom:4px;}
  .word-example{font-size:13px;color:#555;font-style:italic;}

  /* GRAMMAR / DIALOGUE / CLOZE question text */
  .q-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
  .q-text{font-size:17px;line-height:1.7;color:var(--text);margin-bottom:6px;}
  .q-text .blank{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--accent);border-bottom:2px solid var(--accent);padding:0 6px;}
  .q-context{font-size:13px;color:#555;font-style:italic;margin-top:8px;}

  /* READING */
  .reading-passage{font-size:14px;line-height:1.9;color:#bbb;background:#111;border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid var(--border);}
  .reading-passage .highlight{color:var(--accent);font-weight:700;}

  /* OPTIONS */
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .options.single-col{grid-template-columns:1fr;}
  .opt-btn{background:var(--card);border:1.5px solid var(--border);color:var(--text);border-radius:14px;padding:14px 12px;font-family:'Noto Sans TC',sans-serif;font-size:15px;cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.4;}
  .opt-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
  .opt-btn.correct{border-color:var(--correct);background:rgba(74,222,128,0.1);color:var(--correct);}
  .opt-btn.wrong{border-color:var(--wrong);background:rgba(248,113,113,0.1);color:var(--wrong);}
  .opt-btn:disabled{cursor:default;}

  .explain-box{background:#1a1a1a;border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:none;animation:fadeIn 0.3s ease;}
  .explain-box .ex-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
  .explain-box .ex-text{font-size:14px;line-height:1.7;color:#ccc;}
  .feedback.correct{color:var(--correct);}
  .feedback.wrong{color:var(--wrong);}

  .next-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:14px;padding:15px;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all 0.15s;display:none;}
  .next-btn:hover{background:#d4eb3a;transform:translateY(-1px);}
  .q-count{font-size:13px;color:var(--muted);text-align:center;margin-top:10px;}

  /* RESULT */
  .result-screen{text-align:center;padding:20px 0;display:none;}
  .result-emoji{font-size:64px;margin-bottom:14px;display:block;}
  .result-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;margin-bottom:6px;}
  .result-score{font-size:15px;color:var(--muted);margin-bottom:24px;}
  .result-score strong{color:var(--accent);font-size:22px;}
  .result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .restart-btn{background:var(--accent);color:#000;border:none;border-radius:14px;padding:14px 28px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.15s;}
  .restart-btn:hover{background:#d4eb3a;transform:translateY(-2px);}
  .home-btn{background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:14px;padding:14px 28px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;}
  .home-btn:hover{border-color:var(--text);color:var(--text);}

  .fade-in{animation:fadeIn 0.35s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .shake{animation:shake 0.3s ease;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">英文<span>練習</span></div>
    <div class="score-area">
      <div class="score-bar">得分 <span class="score-val" id="score">0</span></div>
      <div class="streak">連勝 <span class="streak-val" id="streak">0</span> 🔥</div>
    </div>
  </div>

  <!-- TOPIC SELECTOR -->
  <div id="topic-screen" class="topic-screen">
    <div class="topic-title">選擇<span>主題</span></div>
    <div class="topic-sub">每次隨機出 10 題，挑戰你的英文實力！</div>
    <div class="topic-grid">
      <div class="topic-btn" onclick="startGame('vocab')">
        <span class="topic-icon">📖</span>
        <div class="topic-name">單字</div>
        <div class="topic-desc">初中高級混合</div>
      </div>
      <div class="topic-btn" onclick="startGame('grammar')">
        <span class="topic-icon">✏️</span>
        <div class="topic-name">文法</div>
        <div class="topic-desc">時態、介系詞等</div>
      </div>
      <div class="topic-btn" onclick="startGame('dialogue')">
        <span class="topic-icon">💬</span>
        <div class="topic-name">對話</div>
        <div class="topic-desc">日常情境應對</div>
      </div>
      <div class="topic-btn" onclick="startGame('cloze')">
        <span class="topic-icon">🔍</span>
        <div class="topic-name">克漏字</div>
        <div class="topic-desc">填入正確單字</div>
      </div>
      <div class="topic-btn" onclick="startGame('reading')" style="grid-column:span 2;">
        <span class="topic-icon">📰</span>
        <div class="topic-name">短篇閱讀</div>
        <div class="topic-desc">閱讀文章後回答問題</div>
      </div>
    </div>
  </div>

  <!-- GAME AREA -->
  <div id="game-screen" style="display:none;">
    <div class="progress-wrap"><div class="progress-bar" id="progress" style="width:0%"></div></div>
    <div id="question-area">
      <div class="card fade-in" id="q-card">
        <div id="q-inner"></div>
      </div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="explain-box" id="explain-box">
        <div class="ex-label">💡 解說</div>
        <div class="ex-text" id="explain-text"></div>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
      <div class="q-count" id="q-count"></div>
    </div>
    <div class="result-screen" id="result-screen">
      <span class="result-emoji" id="result-emoji">🎉</span>
      <div class="result-title" id="result-title">太棒了！</div>
      <div class="result-score">你答對了 <strong id="final-score">0</strong> / 10 題</div>
      <div class="result-btns">
        <button class="restart-btn" onclick="restartGame()">再玩一次 🔄</button>
        <button class="home-btn" onclick="goHome()">選其他主題</button>
      </div>
    </div>
  </div>
</div>

<script>
// ===================== BANKS =====================

const VOCAB = [
  {word:"apple",d:"easy",correct:"蘋果",hint:"名詞 n.",ex:"I eat an apple every day.",opts:["蘋果","香蕉","橘子","葡萄"],explain:"apple 是最常見的水果名詞。Apple a day keeps the doctor away 是著名英文諺語，意思是「每天一顆蘋果，醫生遠離我」。"},
  {word:"happy",d:"easy",correct:"快樂的",hint:"形容詞 adj.",ex:"She is very happy today.",opts:["快樂的","悲傷的","憤怒的","疲倦的"],explain:"happy 是形容詞，表示「快樂的、高興的」。反義詞是 sad（悲傷的）。常見用法：I'm so happy for you!（我為你感到高興！）"},
  {word:"run",d:"easy",correct:"跑步",hint:"動詞 v.",ex:"He likes to run in the park.",opts:["跑步","走路","跳躍","游泳"],explain:"run 作動詞是「跑步」，也有「運作、經營」的意思，例如 run a business（經營公司）。"},
  {word:"beautiful",d:"easy",correct:"美麗的",hint:"形容詞 adj.",ex:"What a beautiful sunset!",opts:["美麗的","醜陋的","普通的","奇怪的"],explain:"beautiful 形容詞，表示「美麗的」，比 pretty 更正式。副詞形式是 beautifully（美麗地）。"},
  {word:"friend",d:"easy",correct:"朋友",hint:"名詞 n.",ex:"She is my best friend.",opts:["朋友","敵人","陌生人","鄰居"],explain:"friend 是名詞「朋友」。friendly 是形容詞「友善的」。make friends（交朋友）是常見片語。"},
  {word:"water",d:"easy",correct:"水",hint:"名詞 n.",ex:"Drink more water.",opts:["水","火","土","空氣"],explain:"water 是不可數名詞「水」。也可作動詞用，如 water the plants（給植物澆水）。"},
  {word:"sleep",d:"easy",correct:"睡覺",hint:"動詞 v.",ex:"I need to sleep early.",opts:["睡覺","醒來","休息","夢想"],explain:"sleep 是動詞「睡覺」，也是名詞，如 get enough sleep（獲得足夠睡眠）。go to sleep 是「去睡覺」的常見說法。"},
  {word:"warm",d:"easy",correct:"溫暖的",hint:"形容詞 adj.",ex:"The soup is warm.",opts:["溫暖的","寒冷的","炎熱的","涼爽的"],explain:"warm 形容詞表示「溫暖的」，介於 hot（熱）和 cool（涼）之間。也可形容人，如 a warm person（熱情的人）。"},
  {word:"smile",d:"easy",correct:"微笑",hint:"動詞 n.",ex:"She has a beautiful smile.",opts:["微笑","大笑","哭泣","皺眉"],explain:"smile 可當動詞「微笑」或名詞「笑容」。比 laugh（大笑）更溫和。Keep smiling!（保持微笑！）"},
  {word:"dream",d:"easy",correct:"夢想",hint:"名詞 n.",ex:"Follow your dream.",opts:["夢想","現實","計畫","目標"],explain:"dream 可當名詞「夢想/夢境」或動詞「夢到」。dream of/about something 表示「夢想某事」。"},
  {word:"share",d:"easy",correct:"分享",hint:"動詞 v.",ex:"Share your food with others.",opts:["分享","保留","收藏","丟棄"],explain:"share 動詞「分享、共用」。share something with someone 是標準句型。在社群媒體中，share 也指「轉發」。"},
  {word:"night",d:"easy",correct:"夜晚",hint:"名詞 n.",ex:"The stars shine at night.",opts:["夜晚","早晨","下午","黃昏"],explain:"night 是名詞「夜晚」。at night 表示「在夜晚」。Good night!（晚安！）是道別用語。"},
  {word:"ambition",d:"medium",correct:"野心",hint:"名詞 n.",ex:"He has great ambition.",opts:["野心","謙遜","冷靜","疲勞"],explain:"ambition 名詞「野心、抱負」。有時帶正面意思（有上進心），有時帶負面意思（過度渴望權力）。形容詞 ambitious 指「有野心的」。"},
  {word:"fragile",d:"medium",correct:"易碎的",hint:"形容詞 adj.",ex:"Handle with care, it's fragile.",opts:["易碎的","堅硬的","柔軟的","沉重的"],explain:"fragile 形容詞「易碎的、脆弱的」。常見於包裹標籤 FRAGILE（易碎品）。也可形容感情，如 a fragile relationship（脆弱的關係）。"},
  {word:"negotiate",d:"medium",correct:"談判",hint:"動詞 v.",ex:"They negotiate the price.",opts:["談判","拒絕","接受","忽視"],explain:"negotiate 動詞「談判、協商」。名詞是 negotiation。negotiate with someone（與某人協商）、negotiate a deal（談成一筆交易）。"},
  {word:"curious",d:"medium",correct:"好奇的",hint:"形容詞 adj.",ex:"Children are naturally curious.",opts:["好奇的","無聊的","害怕的","自信的"],explain:"curious 形容詞「好奇的」。be curious about something 表示「對某事感到好奇」。名詞是 curiosity（好奇心）。"},
  {word:"generous",d:"medium",correct:"慷慨的",hint:"形容詞 adj.",ex:"She is very generous.",opts:["慷慨的","吝嗇的","誠實的","勤奮的"],explain:"generous 形容詞「慷慨的、大方的」。反義詞是 stingy（吝嗇的）。名詞是 generosity（慷慨）。"},
  {word:"anxious",d:"medium",correct:"焦慮的",hint:"形容詞 adj.",ex:"She felt anxious before the test.",opts:["焦慮的","輕鬆的","興奮的","平靜的"],explain:"anxious 形容詞「焦慮的」。be anxious about something 表示「為某事擔憂」。名詞是 anxiety（焦慮）。"},
  {word:"ancient",d:"medium",correct:"古老的",hint:"形容詞 adj.",ex:"This is an ancient temple.",opts:["古老的","現代的","未來的","全新的"],explain:"ancient 形容詞「古老的、古代的」，通常指非常久遠的歷史，如 ancient civilization（古代文明）、ancient Rome（古羅馬）。"},
  {word:"brilliant",d:"medium",correct:"聰明的",hint:"形容詞 adj.",ex:"She is a brilliant student.",opts:["聰明的","平庸的","懶惰的","頑皮的"],explain:"brilliant 形容詞「聰明的、傑出的」，比 smart 更強調天才級別的聰明。也可表示「光輝的」，如 brilliant sunshine（燦爛的陽光）。"},
  {word:"flexible",d:"medium",correct:"靈活的",hint:"形容詞 adj.",ex:"You need a flexible schedule.",opts:["靈活的","僵硬的","固定的","嚴格的"],explain:"flexible 形容詞「靈活的、有彈性的」。a flexible schedule（彈性時間表）。名詞是 flexibility（靈活性）。"},
  {word:"courage",d:"medium",correct:"勇氣",hint:"名詞 n.",ex:"It takes courage to try.",opts:["勇氣","恐懼","力量","智慧"],explain:"courage 名詞「勇氣」，it takes courage to... 表示「做...需要勇氣」。形容詞是 courageous（勇敢的）。"},
  {word:"grateful",d:"medium",correct:"感激的",hint:"形容詞 adj.",ex:"I am grateful for your help.",opts:["感激的","失望的","羨慕的","驚訝的"],explain:"grateful 形容詞「感激的」。be grateful for something（對某事感激）。比 thankful 更正式。名詞是 gratitude（感激之情）。"},
  {word:"enormous",d:"medium",correct:"巨大的",hint:"形容詞 adj.",ex:"The building is enormous.",opts:["巨大的","微小的","適中的","普通的"],explain:"enormous 形容詞「巨大的」，比 big 和 large 程度更強。an enormous amount of（大量的）是常見搭配。"},
  {word:"ephemeral",d:"hard",correct:"短暫的",hint:"形容詞 adj.",ex:"Fame is often ephemeral.",opts:["短暫的","永恆的","明顯的","隱藏的"],explain:"ephemeral 形容詞「短暫的、轉瞬即逝的」，源自希臘文，原意是「只存在一天」。常用於文學或正式寫作，如 ephemeral beauty（短暫的美麗）。"},
  {word:"eloquent",d:"hard",correct:"口才好的",hint:"形容詞 adj.",ex:"He gave an eloquent speech.",opts:["口才好的","沉默的","粗魯的","猶豫的"],explain:"eloquent 形容詞「口才好的、雄辯的」。an eloquent speaker（口才流利的演講者）。名詞是 eloquence（口才、雄辯）。"},
  {word:"inevitable",d:"hard",correct:"不可避免的",hint:"形容詞 adj.",ex:"Change is inevitable.",opts:["不可避免的","可預測的","偶然的","值得懷疑的"],explain:"inevitable 形容詞「不可避免的」，強調某事必然會發生。it is inevitable that...（...是不可避免的）是常見句型。名詞是 inevitability。"},
  {word:"meticulous",d:"hard",correct:"一絲不苟的",hint:"形容詞 adj.",ex:"She is meticulous about details.",opts:["一絲不苟的","粗心大意的","隨意的","急躁的"],explain:"meticulous 形容詞「一絲不苟的、極度細心的」。be meticulous about details（對細節非常講究）。常用於描述工作態度嚴謹的人。"},
  {word:"perseverance",d:"hard",correct:"堅忍不拔",hint:"名詞 n.",ex:"Perseverance leads to success.",opts:["堅忍不拔","輕率魯莽","猶豫不決","漫不經心"],explain:"perseverance 名詞「堅忍不拔、毅力」，強調面對困難仍持續努力。動詞是 persevere（堅持）。Perseverance is the key to success.（毅力是成功的關鍵。）"},
  {word:"catastrophe",d:"hard",correct:"大災難",hint:"名詞 n.",ex:"The flood was a catastrophe.",opts:["大災難","小麻煩","好運氣","奇蹟"],explain:"catastrophe 名詞「大災難、大禍」，比 disaster 程度更嚴重。形容詞是 catastrophic（災難性的）。a catastrophic failure（災難性的失敗）。"},

// ===================== GAME LOGIC =====================
let currentTopic = '';
let questions = [];
let currentQ = 0, score = 0, streak = 0, answered = false;
let readingPassage = null, readingQIdx = 0;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startGame(topic) {
  currentTopic = topic;
  score = 0; streak = 0; currentQ = 0;
  document.getElementById('topic-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('question-area').style.display = 'block';
  updateScore();

  if (topic === 'vocab') {
    const easy = shuffle(VOCAB.filter(w=>w.d==='easy')).slice(0,3);
    const med = shuffle(VOCAB.filter(w=>w.d==='medium')).slice(0,4);
    const hard = shuffle(VOCAB.filter(w=>w.d==='hard')).slice(0,3);
    questions = shuffle([...easy,...med,...hard]);
  } else if (topic === 'grammar') {
    questions = shuffle([...GRAMMAR]).slice(0,10);
  } else if (topic === 'dialogue') {
    questions = shuffle([...DIALOGUE]).slice(0,10);
  } else if (topic === 'cloze') {
    questions = shuffle([...CLOZE]).slice(0,10);
  } else if (topic === 'reading') {
    // pick 4 passages, 3 questions each = 12, take first 10 rendered as flat
    const passages = shuffle([...READING]).slice(0,4);
    questions = [];
    passages.forEach(p => {
      p.questions.forEach(q => questions.push({...q, passage: p.passage}));
    });
    questions = questions.slice(0,10);
  }
  showQuestion();
}

  if (currentTopic === 'vocab') {
    const labels = {easy:'初級',medium:'中級',hard:'高級'};
    const cls = {easy:'badge-easy',medium:'badge-medium',hard:'badge-hard'};
    inner.innerHTML = `
      <div class="diff-badge ${cls[q.d]}">${labels[q.d]}</div>
      <div class="word-display">${q.word}</div>
      <div class="word-example">"${q.ex}"</div>`;
  } else if (currentTopic === 'grammar') {
    const qText = q.q.replace('___', '<span class="blank">___</span>');
    inner.innerHTML = `
      <div class="q-label">文法填空</div>
      <div class="q-text">${qText}</div>`;
    optDiv.className = 'options single-col';
  } else if (currentTopic === 'dialogue') {
    const lines = q.q.split('\n').join('<br>');
    inner.innerHTML = `
      <div class="q-label">情境：${q.context}</div>
      <div class="q-text" style="font-size:15px;">${lines}</div>`;
    optDiv.className = 'options single-col';
  } else if (currentTopic === 'cloze') {
    const qText = q.q.replace('___', '<span class="blank">___</span>');
    inner.innerHTML = `
      <div class="q-label">克漏字</div>
      <div class="q-text">${qText}</div>`;
  } else if (currentTopic === 'reading') {
    inner.innerHTML = `
      <div class="q-label">閱讀測驗</div>
      <div class="reading-passage">${q.passage}</div>
      <div class="q-text" style="font-size:15px;font-weight:700;">${q.q}</div>`;
    optDiv.className = 'options single-col';
  }

  optDiv.innerHTML = '';
  optDiv.className = (currentTopic === 'grammar' || currentTopic === 'dialogue' || currentTopic === 'reading') ? 'options single-col' : 'options';
  shuffle([...q.opts]).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(btn, opt, q.correct);
    optDiv.appendChild(btn);
  });

  const card = document.getElementById('q-card');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

function selectAnswer(btn, selected, correct) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct) b.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  if (selected === correct) {
    btn.classList.add('correct');
    score++; streak++;
    fb.textContent = streak >= 3 ? `🔥 連勝 ${streak} 題！` : '✓ 答對了！';
    fb.className = 'feedback correct';
  } else {
    btn.classList.add('wrong');
    streak = 0;
    fb.textContent = `✗ 正確答案：「${correct}」`;
    fb.className = 'feedback wrong';
    const card = document.getElementById('q-card');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 300);
  }
  // Show explain box
  const q = questions[currentQ];
  if (q.explain) {
    document.getElementById('explain-text').textContent = q.explain;
    document.getElementById('explain-box').style.display = 'block';
  }
  updateScore();
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) showResult();
  else showQuestion();
}

function showResult() {
  document.getElementById('question-area').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('progress').style.width = '100%';
  document.getElementById('final-score').textContent = score;
  const pct = score / questions.length;
  const r = [[1,'🏆','完美滿分！'],[0.8,'🎉','非常優秀！'],[0.6,'👍','還不錯喔！'],[0.4,'📚','繼續加油！'],[-1,'💪','多練習就會進步！']];
  const [,emoji,title] = r.find(([t]) => pct >= t);
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
}

function restartGame() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('question-area').style.display = 'block';
  startGame(currentTopic);
}

function goHome() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('topic-screen').style.display = 'block';
  score = 0; streak = 0;
  updateScore();
}

function updateScore() {
  document.getElementById('score').textContent = score;
  document.getElementById('streak').textContent = streak;
}
</script>
</body>
</html>
